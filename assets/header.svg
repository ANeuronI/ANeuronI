<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 H0 V64" fill="none" stroke="rgba(255,255,255,0.045)" stroke-width="1"></path>
    </pattern>
    <radialGradient id="spot" cx="18%" cy="-10%" r="75%">
      <stop offset="0%" stop-color="#c5f24e" stop-opacity="0.13"></stop>
      <stop offset="70%" stop-color="#c5f24e" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="spot2" cx="88%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.10"></stop>
      <stop offset="70%" stop-color="#5eead4" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="cyber" x1="0" y1="0" x2="1" y2="1">
